<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MusicPlayer</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/player-style.css}">

    <style>

        .album-dropdown-menu {

            margin-top: 8px;

            padding: 0;

            display: none;
            flex-direction: column;

            gap: 8px;

            width: 100%;

            align-items: center;
        }

        .album-dropdown-menu li {

            list-style: none;

            width: 90%;

            margin: 0;

            padding: 0;
        }

        .album-dropdown-menu li a {

            display: flex;
            align-items: center;
            justify-content: flex-start;

            gap: 14px;

            width: 100%;

            padding: 12px 18px;

            border-radius: 12px;

            color: #b3b3b3 !important;

            text-decoration: none;

            transition: all 0.2s ease;

            font-size: 0.92rem;
            font-weight: 600;

            box-sizing: border-box;
        }

        .album-dropdown-menu li a:hover {

            background: rgba(255,255,255,0.05);

            color: #fff !important;
        }

        .album-dropdown-menu li i {

            width: 18px;

            text-align: center;

            font-size: 0.92rem;
        }

    </style>
</head>

<body>

<audio id="audioEngine"
       th:src="${currentSong != null} ? @{'/audio/' + ${currentSong.id} + '.mp3'} : ''"
       crossorigin="anonymous"></audio>

<div class="hybrid-header">

    <div class="container-align header-inner">

        <a th:href="@{/}" class="web-logo">
            MusicPlayer
        </a>

        <div class="search-box">

            <form th:action="@{/}"
                  method="get"
                  style="width: 100%; display: flex;">

                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       placeholder="Tìm bài hát, nghệ sĩ..." />

                <button type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

            </form>

        </div>

    </div>

</div>

<div class="container-align">

    <div class="main-layout">

        <div class="spotify-sidebar">

            <ul class="sidebar-menu">

                <li th:classappend="${filterType == null || filterType == ''} ? 'active-menu' : ''">

                    <a th:href="@{/(action='refresh_playlist')}"
                       style="color: inherit; text-decoration: none; display: block; width: 100%; height: 100%;">

                        <i class="fa-solid fa-compass"></i>
                        Khám phá

                    </a>

                </li>

                <li th:classappend="${filterType == 'library'} ? 'active-menu' : ''">

                    <a href="#"
                       onclick="navigateToLibrary(event)"
                       style="color: inherit; text-decoration: none; display: block; width: 100%; height: 100%;">

                        <i class="fa-solid fa-music"></i>
                        Thư viện cá nhân

                    </a>

                </li>

                <li class="dropdown-item" style="list-style: none;">

                    <a href="#"
                       id="albumMenuBtn"
                       onclick="toggleAlbumDropdown(event)"
                       style="color: inherit; text-decoration: none; display: flex; align-items: center; justify-content: space-between; width: 100%;">

                        <span style="display: flex; align-items: center; gap: 10px;">

                            <i class="fa-solid fa-compact-disc"></i>
                            Album

                        </span>

                        <i class="fa-solid fa-chevron-down"
                           id="arrowIcon"
                           style="font-size: 0.8rem; transition: transform 0.3s; margin-right: 10px;"></i>

                    </a>

                    <ul id="albumDropdown" class="album-dropdown-menu">

                        <li>

                            <a th:href="@{/albums(groupBy='artist')}">

                                <i class="fa-solid fa-microphone"></i>

                                <span>Theo Ca sĩ</span>

                            </a>

                        </li>

                        <li>

                            <a th:href="@{/albums(groupBy='genre')}">

                                <i class="fa-solid fa-sliders"></i>

                                <span>Theo Thể loại</span>

                            </a>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="content-area">

            <h2 class="track-list-title"
                th:text="${filterType == 'library'} ? 'Thư Viện Cá Nhân' : (${keyword != null && !keyword.isEmpty()} ? 'Kết Quả Tìm Kiếm' : 'Đang Thịnh Hành')">

                Đang Thịnh Hành

            </h2>

            <div id="trackListContainer">

                <div th:if="${library == null || #lists.isEmpty(library)}">

                    <p style="color: #b3b3b3; text-align: center; padding-top: 20px;">
                        Không có bài hát nào phù hợp
                    </p>

                </div>

                <div th:each="song, iterStat : ${library}"
                     th:data-href="${filterType == 'library'} ? @{/library(id=${song.id}, mode=${mode})} : @{/(id=${song.id}, keyword=${keyword}, type=${filterType}, value=${filterValue}, mode=${mode})}"
                     onclick="navigateToSong(this)"
                     th:classappend="${currentSong != null && currentSong.id == song.id} ? 'is-playing' : ''"
                     class="hybrid-track">

                    <div class="track-img">
                        <i class="fa-solid fa-compact-disc"></i>
                    </div>

                    <div class="track-info-meta">

                        <h4 class="track-name-row"
                            th:text="${song.title}">
                            Tên bài hát
                        </h4>

                        <span class="track-artist-row"
                              th:text="${song.artist}">
                            Ca sĩ
                        </span>

                    </div>

                    <div class="inline-waveform"
                         th:id="'miniWave-' + ${iterStat.index}">

                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>

                    </div>

                    <div class="track-duration-tag"
                         th:text="${song.duration}">
                        00:00
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<div class="hybrid-player-bar">

    <div class="container-align player-bar-inner">

        <div class="sc-controls">

            <a href="#"
               class="sc-btn"
               id="shuffleBtn"
               onclick="toggleShuffle(event)">

                <i class="fa-solid fa-shuffle"></i>

            </a>

            <a href="#"
               class="sc-btn"
               onclick="prevSong(event)">

                <i class="fa-solid fa-backward-step"></i>

            </a>

            <a href="#"
               class="sc-btn sc-btn-play"
               id="mainPlayBtn"
               onclick="togglePlayPause(event)">

                <i class="fa-solid fa-circle-play"></i>

            </a>

            <a href="#"
               class="sc-btn"
               onclick="nextSong(event)">

                <i class="fa-solid fa-forward-step"></i>

            </a>

            <a href="#"
               class="sc-btn"
               id="repeatBtn"
               onclick="toggleRepeat(event)">

                <i class="fa-solid fa-repeat"></i>

                <span id="repeatBadge"
                      class="sc-badge-one"
                      style="display: none;">1</span>

            </a>

        </div>

        <div class="sc-middle-container">

            <span class="sc-time"
                  id="currentTimeText">00:00</span>

            <div class="sc-waveform-wrapper"
                 id="canvasWrapper"
                 onclick="seekAudio(event)">

                <canvas id="scCanvas"></canvas>

            </div>

            <span class="sc-time total"
                  id="totalTimeText"
                  th:text="${currentSong != null} ? ${currentSong.duration} : '00:00'">

                00:00

            </span>

        </div>

        <div class="sc-right-container">

            <i class="fa-regular fa-heart sc-fav-btn"
               id="playerFavBtn"
               onclick="toggleFavorite(event)"></i>

            <div class="sc-volume-wrapper-vertical">

                <i class="fa-solid fa-volume-high sc-volume-icon-btn"
                   id="volumeIcon"
                   onclick="toggleVolumePopover(event)"></i>

                <div class="sc-volume-popover"
                     id="volumePopover">

                    <input type="range"
                           class="sc-volume-slider-vertical"
                           id="volumeSlider"
                           min="0"
                           max="1"
                           step="0.01"
                           value="1"
                           oninput="changeVolume(this.value)">

                </div>

            </div>

            <div class="sc-mini-thumb">

                <i class="fa-solid fa-music"
                   style="color: rgba(255,255,255,0.4);"></i>

            </div>

            <div class="sc-meta-text">

                <h5 id="playerTitle"
                    th:text="${currentSong != null} ? ${currentSong.title} : 'Chưa chọn bài'">

                    Tên Bài Hát

                </h5>

                <span id="playerArtist"
                      th:text="${currentSong != null} ? ${currentSong.artist} : 'Ca sĩ'">

                    Ca sĩ

                </span>

            </div>

        </div>

    </div>

</div>

<script th:inline="javascript">

    window.libraryData = /*[[${library}]]*/ [];
    window.currentSongData = /*[[${currentSong}]]*/ null;

    function navigateToSong(element) {

        let url = element.getAttribute('data-href');

        if (url) {

            if (typeof MusicDB !== 'undefined') {

                const ids = MusicDB.getFavoriteIdsString();

                if (url.includes('?')) {

                    if (url.includes('value=')) {

                        url = url.replace(/value=[^&]*/, 'value=' + ids);

                    } else {

                        url += '&value=' + ids;
                    }

                } else {

                    url += '?value=' + ids;
                }
            }

            sessionStorage.setItem('scroll_position', window.scrollY);

            window.location.href = url;
        }
    }

    function navigateToLibrary(event) {

        event.preventDefault();

        let ids = '';

        if (typeof MusicDB !== 'undefined') {
            ids = MusicDB.getFavoriteIdsString();
        }

        let url = '/library?type=library&value=' + ids;

        if (window.currentSongData && window.currentSongData.id) {
            url += '&id=' + window.currentSongData.id;
        }

        window.location.href = url;
    }

    function toggleAlbumDropdown(event) {

        event.preventDefault();

        const dropdown = document.getElementById('albumDropdown');
        const arrow = document.getElementById('arrowIcon');

        if (dropdown.style.display === 'none' || dropdown.style.display === '') {

            dropdown.style.display = 'flex';
            arrow.style.transform = 'rotate(180deg)';

        } else {

            dropdown.style.display = 'none';
            arrow.style.transform = 'rotate(0deg)';
        }
    }

</script>

<script th:src="@{/js/player-engine.js}"></script>

</body>
</html>

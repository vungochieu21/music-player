<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MusicPlayer - Albums</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/player-style.css}">

    <style>

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .search-box {
            max-width: 420px;
            width: 100%;
        }

        /* ===== SIDEBAR ===== */

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            color: inherit;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .sidebar-menu li i {
            width: 18px;
            text-align: center;
            font-size: 0.95rem;
        }

        /* ===== ALBUM MENU ===== */

        .album-parent {
            padding: 12px 16px !important;
        }

        .album-parent-title {

            display: flex;
            align-items: center;
            justify-content: space-between;

            width: 100%;
        }

        .album-left {

            display: flex;
            align-items: center;
            gap: 12px;
        }

        .album-arrow {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* ===== DROPDOWN ===== */

        .album-dropdown {

            margin-top: 8px;

            padding: 0;

            display: flex;
            flex-direction: column;
            gap: 8px;

            width: 100%;

            align-items: center;
        }

        .album-dropdown li {

            list-style: none;

            width: 90%;

            margin: 0;

            padding: 0;
        }

        .album-dropdown li a {

            display: flex;
            align-items: center;
            justify-content: flex-start;

            gap: 14px;

            width: 100%;

            padding: 12px 18px;

            border-radius: 12px;

            color: #b3b3b3;

            text-decoration: none;

            transition: all 0.2s ease;

            font-size: 0.92rem;
            font-weight: 600;

            box-sizing: border-box;
        }

        .album-dropdown li a:hover {

            background: rgba(255,255,255,0.05);

            color: #fff;
        }

        .album-dropdown li.active-menu a {

            background: linear-gradient(
                90deg,
                rgba(29,185,84,0.18),
                rgba(29,185,84,0.08)
            );

            color: #1db954;
        }

        .album-dropdown li.active-menu i {
            color: #1db954;
        }

        .album-dropdown li i {

            width: 18px;

            text-align: center;

            font-size: 0.92rem;
        }

        /* ===== CONTENT ===== */

        .content-area {
            overflow: hidden;
        }

        .track-list-title {
            margin-bottom: 8px;
        }

        .album-subtitle {
            color: #a7a7a7;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        /* ===== ALBUM GRID ===== */

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 24px;
        }

        .album-card {
            background: linear-gradient(
                    180deg,
                    rgba(255,255,255,0.05),
                    rgba(255,255,255,0.02)
            );

            padding: 18px;

            border-radius: 14px;

            text-align: left;

            cursor: pointer;

            transition:
                    transform 0.25s ease,
                    background 0.25s ease,
                    box-shadow 0.25s ease;

            text-decoration: none;

            color: white;

            display: block;

            border: 1px solid rgba(255,255,255,0.03);
        }

        .album-card:hover {

            background: linear-gradient(
                    180deg,
                    rgba(255,255,255,0.09),
                    rgba(255,255,255,0.04)
            );

            transform: translateY(-6px);

            box-shadow:
                    0 10px 25px rgba(0,0,0,0.35);
        }

        .album-art {

            width: 100%;
            aspect-ratio: 1;

            border-radius: 12px;

            display: flex;
            align-items: center;
            justify-content: center;

            margin-bottom: 16px;

            font-size: 3.3rem;

            color: #fff;

            background:
                    linear-gradient(
                            135deg,
                            #1db954,
                            #0e7a38
                    );

            box-shadow:
                    0 6px 18px rgba(0,0,0,0.35);
        }

        .album-title {

            font-size: 1rem;

            font-weight: 700;

            margin: 0;

            color: #fff;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .album-count {

            margin-top: 7px;

            display: block;

            color: #b3b3b3;

            font-size: 0.85rem;
        }

        /* ===== RESPONSIVE ===== */

        @media (max-width: 900px) {

            .main-layout {
                grid-template-columns: 1fr;
            }

            .spotify-sidebar {
                display: none;
            }
        }

    </style>
</head>

<body>

<div class="hybrid-header">

    <div class="container-align header-inner">

        <a th:href="@{/}" class="web-logo">
            MusicPlayer
        </a>

        <div class="search-box">

            <form th:action="@{/}"
                  method="get"
                  style="width:100%; display:flex;">

                <input type="text"
                       name="keyword"
                       placeholder="Tìm bài hát, nghệ sĩ..." />

                <button type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

            </form>

        </div>

    </div>

</div>

<div class="container-align">

    <div class="main-layout">

        <!-- SIDEBAR -->

        <div class="spotify-sidebar">

            <ul class="sidebar-menu">

                <li>
                    <a th:href="@{/}">
                        <i class="fa-solid fa-compass"></i>
                        <span>Khám phá</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/library}">
                        <i class="fa-solid fa-music"></i>
                        <span>Thư viện cá nhân</span>
                    </a>
                </li>

                <!-- ALBUM -->

                <li class="album-parent active-menu">

                    <div class="album-parent-title">

                        <div class="album-left">

                            <i class="fa-solid fa-compact-disc"></i>

                            <span>Album</span>

                        </div>

                        <i class="fa-solid fa-chevron-up album-arrow"></i>

                    </div>

                </li>

                <!-- DROPDOWN -->

                <ul class="album-dropdown">

                    <li th:classappend="${type == 'artist'} ? 'active-menu' : ''">

                        <a th:href="@{/albums(groupBy='artist')}">

                            <i class="fa-solid fa-microphone"></i>

                            <span>Theo Ca sĩ</span>

                        </a>

                    </li>

                    <li th:classappend="${type == 'genre'} ? 'active-menu' : ''">

                        <a th:href="@{/albums(groupBy='genre')}">

                            <i class="fa-solid fa-sliders"></i>

                            <span>Theo Thể loại</span>

                        </a>

                    </li>

                </ul>

            </ul>

        </div>

        <!-- CONTENT -->

        <div class="content-area">

            <h2 class="track-list-title"
                th:text="${title}">
                Danh Sách Album
            </h2>

            <div class="album-subtitle">
                Chọn album để phát danh sách bài hát tương ứng
            </div>

            <div class="album-grid">

                <a th:each="album : ${albums}"
                   th:href="@{/(type=${type}, value=${album.key})}"
                   class="album-card">

                    <div class="album-art">

                        <i th:class="${
                            type == 'artist'
                            ? 'fa-solid fa-user-music'
                            : 'fa-solid fa-compact-disc'
                        }"></i>

                    </div>

                    <p class="album-title"
                       th:text="${album.key}">
                        Album
                    </p>

                    <span class="album-count"
                          th:text="${album.value + ' bài hát'}">
                        0 bài hát
                    </span>

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
